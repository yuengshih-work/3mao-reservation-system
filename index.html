/* ---------- 樣式 ---------- */
const CSS = `
.sm-app *{box-sizing:border-box;margin:0;padding:0;}
.sm-app{
  --bg:#EBE0CE; --surface:#FBF6EC; --surface-2:#F3EADb;
  --ink:#3A2A1C; --ink-soft:#7A6553;
  --coffee:#6B4226; --coffee-2:#8C6A4E;
  --accent:#C2703D; --sage:#6F8157; --danger:#B0453A; --gold:#C99A3E;
  --border:#DCCDB4; --border-strong:#C9B595;
  --radius:16px; --shadow:0 6px 22px -10px rgba(74,48,24,.35);
  font-family:'Noto Sans TC',-apple-system,'PingFang TC','Microsoft JhengHei',sans-serif;
  color:var(--ink); background:var(--bg);
  min-height:100%; padding:20px 16px 60px; line-height:1.6;
}
.sm-app h1,.sm-app h2,.sm-app h3{font-family:'Zen Maru Gothic','Noto Sans TC',sans-serif;font-weight:700;line-height:1.3;}
.sm-wrap{max-width:940px;margin:0 auto;}

/* header */
.sm-head{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:18px;}
.sm-logo{flex-shrink:0;display:flex;align-items:center;}
.sm-logo img{height:52px;width:auto;display:block;}
.sm-sysname{font-family:'Zen Maru Gothic','Noto Sans TC',sans-serif;font-weight:700;
  font-size:16px;color:var(--ink-soft);padding-left:14px;
  border-left:2px solid var(--border-strong);letter-spacing:1px;}
.sm-toggle{margin-left:auto;display:flex;background:var(--surface-2);border:1px solid var(--border);
  border-radius:999px;padding:4px;gap:2px;}
.sm-toggle button{
  border:none;background:transparent;cursor:pointer;font-family:inherit;font-size:14px;font-weight:700;
  color:var(--ink-soft);padding:8px 18px;border-radius:999px;transition:.18s;
}
.sm-toggle button.on{background:var(--coffee);color:#fff;box-shadow:0 3px 10px -4px rgba(0,0,0,.4);}

/* sync bar */
.sm-syncbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:12px;
  color:var(--ink-soft);margin-bottom:14px;padding:7px 13px;background:var(--surface-2);
  border:1px solid var(--border);border-radius:10px;}
.sm-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sm-dot.idle{background:var(--sage);}
.sm-dot.saving{background:var(--gold);animation:smpulse 1s infinite;}
.sm-dot.error{background:var(--danger);}
.sm-dot.local{background:var(--coffee-2);}
@keyframes smpulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.sm-sync-refresh{margin-left:auto;border:1px solid var(--border-strong);background:var(--surface);
  color:var(--coffee);font-family:inherit;font-weight:700;font-size:11.5px;padding:5px 11px;
  border-radius:8px;cursor:pointer;}
.sm-sync-refresh:hover{background:var(--surface-2);}
.sm-sync-refresh:disabled{opacity:.5;cursor:not-allowed;}

/* staff bar */
.sm-staffbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px;
  padding:9px 14px;background:var(--coffee);color:#fff;border-radius:11px;font-size:13px;}
.sm-staffbar .who{font-weight:700;display:flex;align-items:center;gap:7px;}
.sm-staffbar .role{font-size:11px;background:rgba(255,255,255,.2);padding:2px 8px;border-radius:999px;font-weight:700;}
.sm-staffbar .acts{margin-left:auto;display:flex;gap:7px;}
.sm-staffbar button{border:1px solid rgba(255,255,255,.4);background:rgba(255,255,255,.1);
  color:#fff;font-family:inherit;font-weight:700;font-size:12px;padding:5px 12px;
  border-radius:8px;cursor:pointer;transition:.15s;}
.sm-staffbar button:hover{background:rgba(255,255,255,.22);}

/* cards / panels */
.sm-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:22px;}
.sm-card+.sm-card{margin-top:16px;}
.sm-sec-title{font-size:16px;margin-bottom:4px;display:flex;align-items:center;gap:8px;}
.sm-sec-sub{font-size:12.5px;color:var(--ink-soft);margin-bottom:18px;}
.sm-bar{height:1px;background:var(--border);margin:18px 0;}

/* form */
.sm-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.sm-field{display:flex;flex-direction:column;gap:6px;}
.sm-field.full{grid-column:1/-1;}
.sm-label{font-size:13px;font-weight:700;color:var(--coffee);display:flex;gap:5px;align-items:center;}
.sm-req{color:var(--danger);font-size:12px;}
.sm-opt{color:var(--ink-soft);font-weight:500;font-size:11.5px;}
.sm-input,.sm-select,.sm-textarea{
  font-family:inherit;font-size:14px;color:var(--ink);background:#fff;
  border:1.5px solid var(--border-strong);border-radius:10px;padding:10px 12px;width:100%;transition:.15s;
}
.sm-input:focus,.sm-select:focus,.sm-textarea:focus{outline:none;border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(194,112,61,.15);}
.sm-input:disabled{background:var(--surface-2);color:var(--ink-soft);}
.sm-textarea{resize:vertical;min-height:64px;}
.sm-err-input{border-color:var(--danger)!important;}
.sm-err{color:var(--danger);font-size:12px;font-weight:600;}

/* stepper */
.sm-stepper{display:flex;align-items:center;border:1.5px solid var(--border-strong);
  border-radius:10px;overflow:hidden;width:fit-content;background:#fff;}
.sm-stepper button{width:38px;height:40px;border:none;background:var(--surface-2);cursor:pointer;
  font-size:18px;color:var(--coffee);font-weight:700;transition:.15s;}
.sm-stepper button:hover{background:var(--accent);color:#fff;}
.sm-stepper button:disabled{opacity:.35;cursor:not-allowed;background:var(--surface-2);color:var(--coffee);}
.sm-stepper span{min-width:46px;text-align:center;font-weight:700;font-size:15px;}

/* buttons */
.sm-btn{font-family:inherit;font-weight:700;font-size:14px;cursor:pointer;border-radius:11px;
  padding:11px 20px;border:1.5px solid transparent;transition:.16s;display:inline-flex;
  align-items:center;gap:7px;justify-content:center;}
.sm-btn:active{transform:translateY(1px);}
.sm-btn-primary{background:var(--coffee);color:#fff;}
.sm-btn-primary:hover{background:#56341d;}
.sm-btn-accent{background:var(--accent);color:#fff;}
.sm-btn-accent:hover{background:#a85d2f;}
.sm-btn-ghost{background:transparent;color:var(--coffee);border-color:var(--border-strong);}
.sm-btn-ghost:hover{background:var(--surface-2);}
.sm-btn-danger{background:transparent;color:var(--danger);border-color:#E0B5AF;}
.sm-btn-danger:hover{background:var(--danger);color:#fff;}
.sm-btn-sm{padding:7px 13px;font-size:12.5px;border-radius:9px;}
.sm-btn-block{width:100%;}
.sm-btn:disabled{opacity:.5;cursor:not-allowed;}

/* badges */
.sm-badge{font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:999px;
  display:inline-flex;align-items:center;gap:4px;white-space:nowrap;}
.sm-badge-coffee{background:#EADCC6;color:var(--coffee);}

/* ============================================================
   資料層 — 後端 API 模式 / 本機預覽模式 自動切換
   ============================================================ */
async function apiGet(token) {
  const url = token ? API_URL + "?token=" + encodeURIComponent(token) : API_URL;
  const res = await fetch(url, { method: "GET" });
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || "讀取失敗");
  return data;
}
async function apiCall(action, payload) {
  // 用 text/plain 傳送,避免觸發 CORS 預檢
  const res = await fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify(Object.assign({ action: action }, payload)),
  });
  return res.json();
}

/* ---- 本機儲存(預覽模式)---- */
const mem = {};
const hasStore = typeof window !== "undefined" && window.storage;
async function loadKey(key, fallback) {
  try {
    if (hasStore) {
      const r = await window.storage.get(key);
      if (r && r.value != null) return JSON.parse(r.value);
    }
  } catch (e) {/* 不存在 */}
  return key in mem ? mem[key] : fallback;
}
async function saveKey(key, value) {
  mem[key] = value;
  try { if (hasStore) await window.storage.set(key, JSON.stringify(value)); }
  catch (e) { console.error("儲存失敗", e); }
}
const K_RES = "sanmao_reservations";
const K_SET = "sanmao_settings";

/* ---- 本機預覽模式的員工帳號 ---- */
let localStaff = [
  { username: "admin", password: "admin1234", displayName: "店長", role: "manager", active: true },
];

/* ---- 登入狀態的安全儲存(localStorage,失敗則記憶體) ---- */
const sessMem = {};
const sessionStore = {
  get(k) { try { return localStorage.getItem(k); } catch (e) { return sessMem[k] || null; } },
  set(k, v) { try { localStorage.setItem(k, v); } catch (e) { sessMem[k] = v; } },
  del(k) { try { localStorage.removeItem(k); } catch (e) { delete sessMem[k]; } },
};
const K_SESSION = "sanmao_session";

/* ---- 統一資料層 ---- */
const dataLayer = {
  mode: API_READY ? "api" : "local",

  // 公開讀取:只回傳營運設定(供前台訂位表單用)
  async loadPublic() {
    if (API_READY) {
      const d = await apiGet();
      return { settings: mergeSettings(d.settings) };
    }
    const s = await loadKey(K_SET, null);
    return { settings: mergeSettings(s) };
  },
  // 登入後讀取:回傳訂位 + 設定
  async loadSecure(token) {
    if (API_READY) {
      const d = await apiGet(token);
      if (!d.reservations) throw new Error("登入已逾期,請重新登入");
      return { reservations: d.reservations, settings: mergeSettings(d.settings), staff: d.staff };
    }
    const r = await loadKey(K_RES, []);
    const s = await loadKey(K_SET, null);
    return { reservations: r, settings: mergeSettings(s) };
  },
  async login(username, password) {
    if (API_READY) {
      const d = await apiCall("login", { username: username, password: password });
      if (!d.ok) throw new Error(d.error || "登入失敗");
      return { staff: d.staff, token: d.token };
    }
    const u = String(username).trim().toLowerCase();
    const s = localStaff.find((x) => x.username.toLowerCase() === u && x.active);
    if (!s || s.password !== password) throw new Error("帳號或密碼錯誤");
    return {
      staff: { username: s.username, displayName: s.displayName, role: s.role },
      token: "LOCAL:" + s.username,
    };
  },
  async addReservation(rec, token, nextList) {
    if (API_READY) {
      const d = await apiCall("add", { reservation: rec, token: token || "" });
      if (!d.ok) throw new Error(d.error || "新增失敗");
      return;
    }
    await saveKey(K_RES, nextList);
  },
  async updateReservation(rec, token, nextList) {
    if (API_READY) {
      const d = await apiCall("update", { reservation: rec, token: token });
      if (!d.ok) throw new Error(d.error || "更新失敗");
      return;
    }
    await saveKey(K_RES, nextList);
  },
  async saveSettings(settings, token) {
    if (API_READY) {
      const d = await apiCall("updateSettings", { settings: settings, token: token });
      if (!d.ok) throw new Error(d.error || "設定儲存失敗");
      return;
    }
    await saveKey(K_SET, settings);
  },
  async listStaff(token) {
    if (API_READY) {
      const d = await apiCall("listStaff", { token: token });
      if (!d.ok) throw new Error(d.error || "讀取員工帳號失敗");
      return d.staff;
    }
    return localStaff.map((s) => ({
      username: s.username, displayName: s.displayName, role: s.role, active: s.active,
    }));
  },
  async saveStaff(staffObj, token) {
    if (API_READY) {
      const d = await apiCall("saveStaff", { staff: staffObj, token: token });
      if (!d.ok) throw new Error(d.error || "儲存失敗");
      return;
    }
    const u = String(staffObj.username).trim().toLowerCase();
    const s = localStaff.find((x) => x.username.toLowerCase() === u);
    if (s) {
      s.displayName = staffObj.displayName || s.displayName;
      s.role = staffObj.role === "manager" ? "manager" : "staff";
      s.active = staffObj.active === false ? false : true;
      if (staffObj.password) s.password = staffObj.password;
    } else {
      if (!staffObj.password) throw new Error("新帳號請設定密碼");
      localStaff.push({
        username: u, displayName: staffObj.displayName || u,
        role: staffObj.role === "manager" ? "manager" : "staff",
        active: true, password: staffObj.password,
      });
    }
  },
  async changePassword(token, oldPassword, newPassword) {
    if (API_READY) {
      const d = await apiCall("changePassword", {
        token: token, oldPassword: oldPassword, newPassword: newPassword,
      });
      if (!d.ok) throw new Error(d.error || "密碼變更失敗");
      return d.token;
    }
    const username = token.split(":")[1];
    const s = localStaff.find((x) => x.username === username);
    if (!s || s.password !== oldPassword) throw new Error("目前密碼錯誤");
    s.password = newPassword;
    return token;
  },
};

/* ---------- 預設設定與工具 ---------- */
const DEFAULT_SETTINGS = {
  businessHours: { open: "11:00", close: "21:00", slotMinutes: 30, lastBeforeClose: 60 },
  closedDates: [],
  weeklyClosedDays: [],
};
function mergeSettings(s) {
  s = s || {};
  return {
    businessHours: Object.assign({}, DEFAULT_SETTINGS.businessHours, s.businessHours || {}),
    closedDates: Array.isArray(s.closedDates) ? s.closedDates : [],
    weeklyClosedDays: Array.isArray(s.weeklyClosedDays) ? s.weeklyClosedDays : [],
  };
}
const WD = ["日", "一", "二", "三", "四", "五", "六"];
const TABLES = Array.from({ length: 16 }, (_, i) => i + 1);

const todayStr = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
};
const toMin = (t) => { const [h, m] = t.split(":").map(Number); return h * 60 + m; };
const fromMin = (m) => `${String(Math.floor(m / 60)).padStart(2, "0")}:${String(m % 60).padStart(2, "0")}`;
const dowOf = (dateStr) => new Date(dateStr + "T00:00:00").getDay();
const fmtDate = (dateStr) => {
  if (!dateStr) return "";
  const d = new Date(dateStr + "T00:00:00");
  return `${d.getMonth() + 1}/${d.getDate()}（${WD[d.getDay()]}）`;
};
const shortTime = (iso) => {
  if (!iso) return "";
  const d = new Date(iso);
  if (isNaN(d.getTime())) return "";
  return `${d.getMonth() + 1}/${d.getDate()} ${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}`;
};
function genSlots(bh) {
  const start = toMin(bh.open);
  const end = toMin(bh.close) - (bh.lastBeforeClose || 0);
  const step = bh.slotMinutes || 30;
  const out = [];
  for (let m = start; m <= end; m += step) out.push(fromMin(m));
  return out;
}
function dateClosed(dateStr, settings) {
  if (!dateStr) return false;
  if (settings.closedDates.includes(dateStr)) return true;
  if (settings.weeklyClosedDays.includes(dowOf(dateStr))) return true;
  return false;
}
const newId = () => "R" + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);

/* ---------- 訂位驗證 ---------- */
function validateBooking(f, settings, { hardClosed }) {
  const e = {};
  if (!f.name.trim()) e.name = "請填寫姓名";
  if (!f.phone.trim()) e.phone = "請填寫電話";
  else if (!/[0-9]{6,}/.test(f.phone.replace(/[^0-9]/g, ""))) e.phone = "電話格式不正確";
  if (!f.partySize || f.partySize < 1) e.partySize = "請選擇人數";
  if (!f.date) e.date = "請選擇日期";
  else if (f.date < todayStr()) e.date = "不可選擇過去日期";
  else if (hardClosed && dateClosed(f.date, settings)) e.date = "該日為公休日,無法訂位";
  if (!f.time) e.time = "請選擇時間";
  if (f.email && !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(f.email)) e.email = "Email 格式不正確";
  return e;
}

/* ============================================================
   前台 — 顧客訂位
   ============================================================ */
function FrontDesk({ settings, onSubmit }) {
  const blank = {
    date: "", time: "", name: "", phone: "", partySize: 2,
    email: "", children: 0, pets: 0, notes: "",
  };
  const [f, setF] = useState(blank);
  const [errs, setErrs] = useState({});
  const [done, setDone] = useState(null);
  const [submitting, setSubmitting] = useState(false);
  const [submitErr, setSubmitErr] = useState("");
  const set = (k, v) => setF((p) => ({ ...p, [k]: v }));

  const slots = useMemo(() => genSlots(settings.businessHours), [settings]);
  const availableSlots = useMemo(() => {
    if (f.date === todayStr()) {
      const now = new Date();
      const nowMin = now.getHours() * 60 + now.getMinutes();
      return slots.filter((s) => toMin(s) > nowMin);
    }
    return slots;
  }, [slots, f.date]);

  const isClosed = f.date && dateClosed(f.date, settings);

  const submit = async () => {
    const e = validateBooking(f, settings, { hardClosed: true });
    setErrs(e);
    if (Object.keys(e).length) return;
    const record = {
      id: newId(), ...f,
      name: f.name.trim(), phone: f.phone.trim(), email: f.email.trim(), notes: f.notes.trim(),
      tableNumber: null, staffNotes: "", status: "confirmed",
      source: "online", createdAt: new Date().toISOString(),
      lastEditBy: "", lastEditAt: "",
    };
    setSubmitting(true);
    setSubmitErr("");
    const ok = await onSubmit(record);
    setSubmitting(false);
    if (ok) setDone(record);
    else setSubmitErr("訂位送出失敗,請檢查網路後再試一次,或直接來電訂位。");
  };

  if (done) {
    return (
      <div className="sm-card">
        <div className="sm-success">
          <div className="ic">✓</div>
          <h2>訂位成功!</h2>
          <p>我們已收到您的訂位資料,期待您的光臨 🐾</p>
          {done.email && <p>訂位確認信將寄送至 {done.email}</p>}
          <div className="sm-summary">
            <div className="sm-summary-row"><span>日期</span><b>{fmtDate(done.date)}</b></div>
            <div className="sm-summary-row"><span>時間</span><b>{done.time}</b></div>
            <div className="sm-summary-row"><span>姓名</span><b>{done.name}</b></div>
            <div className="sm-summary-row"><span>電話</span><b>{done.phone}</b></div>
            <div className="sm-summary-row"><span>人數</span><b>{done.partySize} 位
              {done.children > 0 && ` ・ 幼童 ${done.children}`}
              {done.pets > 0 && ` ・ 寵物 ${done.pets}`}</b></div>
            {done.notes && <div className="sm-summary-row"><span>備註</span><b>{done.notes}</b></div>}
          </div>
          <button className="sm-btn sm-btn-primary" onClick={() => { setF(blank); setDone(null); setErrs({}); }}>
            再訂一筆
          </button>
        </div>
      </div>
    );
  }

  return (
    <div className="sm-card">
      <h2 className="sm-sec-title">🗓️ 線上訂位</h2>
      <p className="sm-sec-sub">
        營業時間 {settings.businessHours.open}–{settings.businessHours.close}　
        標示 <span className="sm-req">*</span> 為必填欄位
      </p>

      {submitErr && <div className="sm-banner-err">⚠ {submitErr}</div>}

      <div className="sm-grid">
        <div className="sm-field">
          <label className="sm-label">日期 <span className="sm-req">*</span></label>
          <input type="date" className={"sm-input" + (errs.date ? " sm-err-input" : "")}
            min={todayStr()} value={f.date} onChange={(e) => set("date", e.target.value)} />
          {errs.date && <span className="sm-err">{errs.date}</span>}
          {isClosed && !errs.date && <span className="sm-err">該日為公休日,無法訂位</span>}
        </div>
        <div className="sm-field">
          <label className="sm-label">時間 <span className="sm-req">*</span></label>
          <select className={"sm-select" + (errs.time ? " sm-err-input" : "")}
            value={f.time} onChange={(e) => set("time", e.target.value)} disabled={!f.date || isClosed}>
            <option value="">{!f.date ? "請先選日期" : "請選擇時段"}</option>

function ReservationCard({ res, settings, allRes, onUpdate, onReschedule }) {
  const [staffNotes, setStaffNotes] = useState(res.staffNotes || "");
  useEffect(() => { setStaffNotes(res.staffNotes || ""); }, [res.staffNotes]);

  const occupiedTables = allRes
    .filter((r) => r.status === "confirmed" && r.date === res.date && r.time === res.time
      && r.id !== res.id && r.tableNumber)
    .map((r) => r.tableNumber);
  const conflict = res.tableNumber && occupiedTables.includes(res.tableNumber);

  return (
    <div className={"sm-res" + (res.status === "cancelled" ? " cancelled" : "")}>
      <div className="sm-res-top">
        <span className="sm-res-time">{res.time}</span>
        <span className="sm-res-name">{res.name}</span>
        <span className="sm-res-date">{fmtDate(res.date)}</span>
        <div style={{ marginLeft: "auto", display: "flex", gap: 6, flexWrap: "wrap" }}>
          {res.source === "manual" && <span className="sm-badge sm-badge-gray">手動新增</span>}
          {res.status === "cancelled"
            ? <span className="sm-badge sm-badge-danger">已取消</span>
            : res.tableNumber
              ? <span className="sm-badge sm-badge-coffee">桌號 {res.tableNumber}</span>
              : <span className="sm-badge sm-badge-gold">待排桌</span>}
        </div>
      </div>

      <div className="sm-res-info">
        <span>📞 <b>{res.phone}</b></span>
        <span>👥 <b>{res.partySize}</b> 位</span>
        {res.children > 0 && <span>幼童 <b>{res.children}</b></span>}
        {res.pets > 0 && <span>🐾 寵物 <b>{res.pets}</b></span>}
        {res.email && <span>✉️ {res.email}</span>}
      </div>

      {res.notes && <div className="sm-res-note"><span className="lbl">顧客備註</span>{res.notes}</div>}

      <div className="sm-res-note" style={{ background: "#EDE3D0" }}>
        <span className="lbl">員工備註</span>
        <input className="sm-input" style={{ marginTop: 4, fontSize: 12.5, padding: "6px 9px" }}
          placeholder="點此輸入內部備註,點擊他處即儲存…" value={staffNotes}
          onChange={(e) => setStaffNotes(e.target.value)}
          onBlur={() => { if (staffNotes !== (res.staffNotes || "")) onUpdate({ ...res, staffNotes }); }} />
      </div>

      {res.lastEditBy && (
        <div className="sm-res-edit">最後異動:{res.lastEditBy}
          {res.lastEditAt && " · " + shortTime(res.lastEditAt)}</div>
      )}

      {res.status !== "cancelled" && (
        <div className="sm-res-actions">
          <div className="sm-table-pick">
            <span className="sm-hint">桌號</span>
            <select className="sm-select" value={res.tableNumber || ""}
              onChange={(e) => onUpdate({ ...res, tableNumber: e.target.value ? Number(e.target.value) : null })}>
              <option value="">未指定</option>
              {TABLES.map((t) => (
                <option key={t} value={t}>
                  {t} 桌{occupiedTables.includes(t) ? "(已用)" : ""}
                </option>
              ))}
            </select>
          </div>
          {conflict && <span className="sm-mini-note">⚠ 此桌同時段重複</span>}
          <button className="sm-btn sm-btn-ghost sm-btn-sm" onClick={() => onReschedule(res)}>改時間</button>
          <button className="sm-btn sm-btn-danger sm-btn-sm"
            onClick={() => { if (confirm(`確定取消「${res.name}」的訂位?`)) onUpdate({ ...res, status: "cancelled" }); }}>
            取消訂位
          </button>
        </div>
      )}
      {res.status === "cancelled" && (
        <div className="sm-res-actions">
          <button className="sm-btn sm-btn-ghost sm-btn-sm"
            onClick={() => onUpdate({ ...res, status: "confirmed" })}>復原訂位</button>
        </div>
      )}
    </div>
  );
}

/* ---------- 改時間 modal ---------- */
function RescheduleModal({ res, settings, onClose, onSave }) {
  const [date, setDate] = useState(res.date);
  const [time, setTime] = useState(res.time);
  const [saving, setSaving] = useState(false);
  const slots = useMemo(() => genSlots(settings.businessHours), [settings]);
  const closed = dateClosed(date, settings);

  const save = async () => {
    setSaving(true);
    const ok = await onSave({ ...res, date, time });
    setSaving(false);
    if (!ok) alert("改期儲存失敗,請稍後再試");
  };

  return (
    <Modal title={`改期 — ${res.name}`} onClose={onClose}>
      <div className="sm-grid">
        <div className="sm-field">
          <label className="sm-label">新日期</label>
          <input type="date" className="sm-input" min={todayStr()}
            value={date} onChange={(e) => setDate(e.target.value)} />

        <div className="sm-field">
          <label className="sm-label">新時間</label>
          <select className="sm-select" value={time} onChange={(e) => setTime(e.target.value)}>

        <button className="sm-btn sm-btn-ghost" onClick={onClose}>取消</button>
        <button className="sm-btn sm-btn-primary sm-btn-block" onClick={save} disabled={saving}>
          {saving ? "儲存中…" : "儲存變更"}
        </button>
      </div>
    </Modal>
  );
}

/* ---------- 訂位清單 ---------- */
function ReservationList({ reservations, settings, onUpdate }) {
  const [filterDate, setFilterDate] = useState(todayStr());
  const [showAll, setShowAll] = useState(false);
  const [search, setSearch] = useState("");
  const [reschedule, setReschedule] = useState(null);
  const [showAdd, setShowAdd] = useState(false);

  const filtered = useMemo(() => {
    let list = reservations;
    if (!showAll) list = list.filter((r) => r.date === filterDate);
    if (search.trim()) {
      const q = search.trim().toLowerCase();
      list = list.filter((r) => r.name.toLowerCase().includes(q) || r.phone.includes(q));
    }
    return [...list].sort((a, b) => {
      if (a.status !== b.status) return a.status === "cancelled" ? 1 : -1;
      if (a.date !== b.date) return a.date < b.date ? -1 : 1;
      return a.time < b.time ? -1 : 1;
    });
  }, [reservations, filterDate, showAll, search]);

  const active = filtered.filter((r) => r.status === "confirmed");
  const stats = {
    groups: active.length,
    guests: active.reduce((s, r) => s + Number(r.partySize), 0),
    children: active.reduce((s, r) => s + Number(r.children), 0),
    pets: active.reduce((s, r) => s + Number(r.pets), 0),
  };
  const busyTables = active.filter((r) => r.tableNumber).map((r) => r.tableNumber);

  return (
    <div className="sm-card">
      <h2 className="sm-sec-title">📋 訂位清單</h2>
      <p className="sm-sec-sub">可指派桌號(1–16)、改期、取消,或手動新增訂位</p>

      <div className="sm-filters">
        <div className="sm-field">
          <label className="sm-label">查詢日期</label>
          <input type="date" className="sm-input" value={filterDate}
            disabled={showAll} onChange={(e) => setFilterDate(e.target.value)} />
        </div>
        <div className="sm-field">
          <label className="sm-label">姓名 / 電話</label>
          <input className="sm-input" placeholder="搜尋…" value={search}
            onChange={(e) => setSearch(e.target.value)} />
        </div>
        <button className={"sm-btn sm-btn-sm " + (showAll ? "sm-btn-accent" : "sm-btn-ghost")}
          onClick={() => setShowAll((v) => !v)}>{showAll ? "✓ 顯示全部" : "顯示全部"}</button>
        <button className="sm-btn sm-btn-primary sm-btn-sm" onClick={() => setShowAdd(true)}>＋ 手動新增</button>
      </div>

      <div className="sm-stats">
        <div className="sm-stat"><b>{stats.groups}</b><span>訂位組數</span></div>
        <div className="sm-stat"><b>{stats.guests}</b><span>總人數</span></div>
        <div className="sm-stat"><b>{stats.children}</b><span>幼童</span></div>
        <div className="sm-stat"><b>{stats.pets}</b><span>寵物</span></div>
      </div>

      {!showAll && (
        <div style={{ marginBottom: 16 }}>
          <span className="sm-hint" style={{ fontWeight: 700 }}>
            {fmtDate(filterDate)} 桌況　
            <span style={{ color: "var(--coffee)" }}>■</span> 已訂　
            <span style={{ color: "var(--border-strong)" }}>□</span> 空桌
          </span>
          <div className="sm-tgrid">
            {TABLES.map((t) => (
              <div key={t} className={"sm-tcell" + (busyTables.includes(t) ? " busy" : "")}>{t}</div>
            ))}
          </div>
        </div>
      )}

      {filtered.length === 0 ? (
        <div className="sm-empty"><div className="ic">🍽️</div>此條件下沒有訂位資料</div>
      ) : (
        filtered.map((r) => (
          <ReservationCard key={r.id} res={r} settings={settings} allRes={reservations}
            onUpdate={onUpdate} onReschedule={setReschedule} />
        ))
      )}

      {reschedule && (
        <RescheduleModal res={reschedule} settings={settings} onClose={() => setReschedule(null)}
          onSave={async (updated) => {
            const ok = await onUpdate(updated);
            if (ok) setReschedule(null);
            return ok;
          }} />
      )}
      {showAdd && (
        <ManualAddModal settings={settings} onClose={() => setShowAdd(false)}
          onAdd={async (rec) => {
            const ok = await onUpdate(rec, true);
            if (ok) setShowAdd(false);
            return ok;
          }} />
      )}
    </div>
  );
}

/* ---------- 營運設定 ---------- */
function SettingsPanel({ settings, onChange }) {
  const [newClosed, setNewClosed] = useState("");
  const bh = settings.businessHours;
  const setBH = (k, v) => onChange({ ...settings, businessHours: { ...bh, [k]: v } });

  const addClosed = () => {
    if (!newClosed || settings.closedDates.includes(newClosed)) return;
    onChange({ ...settings, closedDates: [...settings.closedDates, newClosed].sort() });
    setNewClosed("");
  };
  const removeClosed = (d) =>
    onChange({ ...settings, closedDates: settings.closedDates.filter((x) => x !== d) });
  const toggleWeekday = (i) => {
    const has = settings.weeklyClosedDays.includes(i);
    onChange({
      ...settings,
      weeklyClosedDays: has
        ? settings.weeklyClosedDays.filter((x) => x !== i)
        : [...settings.weeklyClosedDays, i],
    });
  };

  return (
    <div className="sm-card">
      <h2 className="sm-sec-title">⚙️ 營運設定</h2>
      <p className="sm-sec-sub">設定營業時間與公休日,前台將自動套用(公休日與非營業時段無法訂位)</p>

      <h3 style={{ fontSize: 14, marginBottom: 10, color: "var(--coffee)" }}>營業時間</h3>
      <div className="sm-grid">
        <div className="sm-field">
          <label className="sm-label">開始營業</label>
          <input type="time" className="sm-input" value={bh.open}
            onChange={(e) => setBH("open", e.target.value)} />
        </div>
        <div className="sm-field">
          <label className="sm-label">結束營業</label>
          <input type="time" className="sm-input" value={bh.close}
            onChange={(e) => setBH("close", e.target.value)} />
        </div>
        <div className="sm-field">
          <label className="sm-label">訂位時段間隔</label>
          <select className="sm-select" value={bh.slotMinutes}
            onChange={(e) => setBH("slotMinutes", Number(e.target.value))}>
            <option value={15}>每 15 分鐘</option>
            <option value={30}>每 30 分鐘</option>
            <option value={60}>每 60 分鐘</option>
          </select>
        </div>
        <div className="sm-field">
          <label className="sm-label">最後訂位(閉店前)</label>
          <select className="sm-select" value={bh.lastBeforeClose}
            onChange={(e) => setBH("lastBeforeClose", Number(e.target.value))}>
            <option value={0}>至閉店時間</option>
            <option value={30}>閉店前 30 分鐘</option>
            <option value={60}>閉店前 1 小時</option>
            <option value={90}>閉店前 1.5 小時</option>
          </select>
        </div>
      </div>

      <div className="sm-bar" />

      <h3 style={{ fontSize: 14, marginBottom: 4, color: "var(--coffee)" }}>每週固定公休</h3>
      <p className="sm-hint" style={{ marginBottom: 10 }}>點選每週固定不營業的星期</p>
      <div className="sm-weekdays">
        {WD.map((d, i) => (
          <button key={i} className={"sm-wd" + (settings.weeklyClosedDays.includes(i) ? " on" : "")}
            onClick={() => toggleWeekday(i)}>{d}</button>
        ))}
      </div>

      <div className="sm-bar" />

      <h3 style={{ fontSize: 14, marginBottom: 4, color: "var(--coffee)" }}>特定公休日期</h3>
      <p className="sm-hint" style={{ marginBottom: 10 }}>新增國定假日、員工旅遊、店休等特定日期</p>
      <div style={{ display: "flex", gap: 8, marginBottom: 14, flexWrap: "wrap" }}>
        <input type="date" className="sm-input" style={{ width: "auto" }} min={todayStr()}
          value={newClosed} onChange={(e) => setNewClosed(e.target.value)} />
        <button className="sm-btn sm-btn-accent sm-btn-sm" onClick={addClosed}>＋ 新增公休日</button>
      </div>
      {settings.closedDates.length === 0 ? (
        <p className="sm-hint">尚未設定特定公休日</p>
      ) : (
        <div className="sm-chips">
          {settings.closedDates.map((d) => (
            <span key={d} className="sm-chip">
              {fmtDate(d)}
              <button onClick={() => removeClosed(d)}>✕</button>
            </span>
          ))}
        </div>
      )}
    </div>
  );
}

  const [f, setF] = useState({

    displayName: staff ? staff.displayName : "",
    role: staff ? staff.role : "staff",
    active: staff ? staff.active : true,
    password: "",
  });
  const [err, setErr] = useState("");
  const [saving, setSaving] = useState(false);
  const set = (k, v) => setF((p) => ({ ...p, [k]: v }));
  const isSelf = isEdit && staff.username.toLowerCase() === currentUser.username.toLowerCase();

  const submit = async () => {
    setErr("");
    if (!isEdit) {
      if (!/^[a-zA-Z0-9_.]{3,20}$/.test(f.username))
        return setErr("帳號限 3-20 字,僅可用英數字、底線、句點");
      if (f.password.length < 6) return setErr("新帳號密碼至少 6 個字");
    }
    if (!f.displayName.trim()) return setErr("請填寫顯示名稱");
    if (isEdit && f.password && f.password.length < 6) return setErr("密碼至少 6 個字");
    setSaving(true);
    try {
      await onSave({
        username: f.username.trim(),
        displayName: f.displayName.trim(),
        role: f.role,
        active: f.active,
        password: f.password || undefined,
      });
    } catch (e) {
      setErr(String(e.message || e));
      setSaving(false);
    }
  };

  return (
    <Modal title={isEdit ? `編輯帳號 — ${staff.displayName}` : "新增員工帳號"} onClose={onClose}>
      {err && <div className="sm-banner-err">⚠ {err}</div>}
      <div className="sm-grid">
        <div className="sm-field">
          <label className="sm-label">帳號 <span className="sm-req">*</span></label>
          <input className="sm-input" value={f.username} disabled={isEdit}
            placeholder="英文/數字,例:amy" onChange={(e) => set("username", e.target.value)} />
          {isEdit && <span className="sm-hint">帳號建立後不可修改</span>}
        </div>
        <div className="sm-field">
          <label className="sm-label">顯示名稱 <span className="sm-req">*</span></label>
          <input className="sm-input" value={f.displayName}
            placeholder="例:陳小美" onChange={(e) => set("displayName", e.target.value)} />
        </div>
        <div className="sm-field">
          <label className="sm-label">角色</label>
          <select className="sm-select" value={f.role} onChange={(e) => set("role", e.target.value)}>
            <option value="staff">一般員工</option>
            <option value="manager">店長(可管理帳號)</option>
          </select>
        </div>
        <div className="sm-field">
          <label className="sm-label">帳號狀態</label>
          <select className="sm-select" value={f.active ? "1" : "0"}
            disabled={isSelf}
            onChange={(e) => set("active", e.target.value === "1")}>
            <option value="1">啟用</option>
            <option value="0">停用(無法登入)</option>
          </select>
          {isSelf && <span className="sm-hint">無法停用自己的帳號</span>}
        </div>
        <div className="sm-field full">
          <label className="sm-label">
            {isEdit ? "重設密碼 " : "密碼 "}
            {isEdit
              ? <span className="sm-opt">(留空表示不變更)</span>
              : <span className="sm-req">*</span>}
          </label>
          <input className="sm-input" type="password" value={f.password}
            placeholder={isEdit ? "如需重設才填寫" : "至少 6 個字"}
            onChange={(e) => set("password", e.target.value)} />
        </div>
      </div>
      <div className="sm-bar" />
      <div style={{ display: "flex", gap: 8 }}>
        <button className="sm-btn sm-btn-ghost" onClick={onClose}>取消</button>
        <button className="sm-btn sm-btn-primary sm-btn-block" onClick={submit} disabled={saving}>
          {saving ? "儲存中…" : (isEdit ? "儲存變更" : "建立帳號")}
        </button>
      </div>
    </Modal>
  );
}

/* ---------- 員工帳號管理(僅店長可見) ---------- */
function StaffPanel({ token, currentUser }) {
  const [list, setList] = useState(null);
  const [err, setErr] = useState("");
  const [editing, setEditing] = useState(undefined); // undefined=關閉, null=新增, obj=編輯

  const reload = useCallback(async () => {
    setErr("");
    try {
      const staff = await dataLayer.listStaff(token);
      setList(staff);
    } catch (e) {
      setErr(String(e.message || e));
      setList([]);
    }
  }, [token]);

  useEffect(() => { reload(); }, [reload]);

  const save = async (staffObj) => {
    await dataLayer.saveStaff(staffObj, token);
    setEditing(undefined);
    await reload();
  };

  return (
    <div className="sm-card">
      <h2 className="sm-sec-title">👥 員工帳號</h2>
      <p className="sm-sec-sub">建立、停用員工帳號或重設密碼。店長角色可管理帳號,一般員工僅能操作訂位。</p>

      {err && <div className="sm-banner-err">⚠ {err}</div>}

      <button className="sm-btn sm-btn-primary sm-btn-sm" style={{ marginBottom: 16 }}
        onClick={() => setEditing(null)}>＋ 新增員工帳號</button>

      {list === null ? (
        <div className="sm-empty"><div className="ic">⏳</div>載入中…</div>
      ) : list.length === 0 ? (
        <div className="sm-empty"><div className="ic">👤</div>尚無員工帳號</div>
      ) : (
        list.map((s) => (
          <div key={s.username} className={"sm-staff-row" + (s.active ? "" : " off")}>
            <div>
              <div className="sm-staff-name">
                {s.displayName}
                {s.username.toLowerCase() === currentUser.username.toLowerCase() &&
                  <span className="sm-hint"> (目前登入)</span>}
              </div>
              <div className="sm-staff-user">@{s.username}</div>
            </div>
            <span className={"sm-badge " + (s.role === "manager" ? "sm-badge-accent" : "sm-badge-gray")}>
              {s.role === "manager" ? "店長" : "一般員工"}
            </span>
            {!s.active && <span className="sm-badge sm-badge-danger">已停用</span>}
            <div className="acts">
              <button className="sm-btn sm-btn-ghost sm-btn-sm" onClick={() => setEditing(s)}>
                編輯
              </button>
            </div>
          </div>
        ))
      )}

      {editing !== undefined && (
        <StaffEditModal staff={editing} currentUser={currentUser}
          onClose={() => setEditing(undefined)} onSave={save} />
      )}
    </div>
  );
}

/* ---------- 修改自己的密碼 modal ---------- */
function ChangePasswordModal({ token, onClose, onChanged }) {
  const [oldPw, setOldPw] = useState("");
  const [newPw, setNewPw] = useState("");
  const [confirm, setConfirm] = useState("");
  const [err, setErr] = useState("");
  const [saving, setSaving] = useState(false);

  const submit = async () => {
    setErr("");
    if (newPw.length < 6) return setErr("新密碼至少 6 個字");
    if (newPw !== confirm) return setErr("兩次輸入的新密碼不一致");
    setSaving(true);
    try {
      const newToken = await dataLayer.changePassword(token, oldPw, newPw);
      onChanged(newToken);
    } catch (e) {
      setErr(String(e.message || e));
      setSaving(false);
    }
  };

  return (
    <Modal title="修改密碼" onClose={onClose}>
      {err && <div className="sm-banner-err">⚠ {err}</div>}
      <div className="sm-field" style={{ marginBottom: 12 }}>
        <label className="sm-label">目前密碼</label>
        <input className="sm-input" type="password" value={oldPw}
          onChange={(e) => setOldPw(e.target.value)} />
      </div>
      <div className="sm-field" style={{ marginBottom: 12 }}>
        <label className="sm-label">新密碼</label>
        <input className="sm-input" type="password" value={newPw}
          placeholder="至少 6 個字" onChange={(e) => setNewPw(e.target.value)} />
      </div>
      <div className="sm-field">
        <label className="sm-label">再次輸入新密碼</label>
        <input className="sm-input" type="password" value={confirm}
          onChange={(e) => setConfirm(e.target.value)} />
      </div>
      <div className="sm-bar" />
      <div style={{ display: "flex", gap: 8 }}>
        <button className="sm-btn sm-btn-ghost" onClick={onClose}>取消</button>
        <button className="sm-btn sm-btn-primary sm-btn-block" onClick={submit} disabled={saving}>
          {saving ? "更新中…" : "更新密碼"}
        </button>
      </div>
    </Modal>
  );
}

/* ---------- 登入畫面 ---------- */
function LoginScreen({ onLogin }) {
  const [username, setUsername] = useState("");
  const [password, setPassword] = useState("");
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);

  const submit = async () => {
    if (!username.trim() || !password) { setErr("請輸入帳號與密碼"); return; }
    setErr("");
    setBusy(true);
    try {
      await onLogin(username.trim(), password);
    } catch (e) {
      setErr(String(e.message || e));
      setBusy(false);
    }
  };

  return (
    <div className="sm-card sm-login">
      <div className="sm-login-logo"><img src={LOGO} alt="三毛咖啡 寵物咖啡" /></div>
      <h2>後台管理登入</h2>
      <p className="sub">請使用員工帳號登入</p>

      {err && <div className="sm-banner-err">⚠ {err}</div>}

      <div className="sm-field" style={{ marginBottom: 12 }}>
        <label className="sm-label">帳號</label>
        <input className="sm-input" value={username} autoFocus
          onChange={(e) => setUsername(e.target.value)}
          onKeyDown={(e) => e.key === "Enter" && submit()} />
      </div>
      <div className="sm-field" style={{ marginBottom: 18 }}>
        <label className="sm-label">密碼</label>
        <input className="sm-input" type="password" value={password}
          onChange={(e) => setPassword(e.target.value)}
          onKeyDown={(e) => e.key === "Enter" && submit()} />
      </div>
      <button className="sm-btn sm-btn-primary sm-btn-block" onClick={submit} disabled={busy}>
        {busy ? "登入中…" : "登入"}
      </button>
      {!API_READY && (
        <p className="sm-hint" style={{ textAlign: "center", marginTop: 14 }}>
          預覽模式測試帳號:admin / admin1234
        </p>
      )}
    </div>
  );
}

/* ---------- 後台主框架 ---------- */
function BackOffice({ reservations, settings, staff, token, onUpdateRes, onUpdateSettings }) {
  const [tab, setTab] = useState("list");
  const isManager = staff.role === "manager";

  return (
    <div>
      <div className="sm-tabs">
        <button className={"sm-tab" + (tab === "list" ? " on" : "")} onClick={() => setTab("list")}>
          訂位清單
        </button>
        <button className={"sm-tab" + (tab === "settings" ? " on" : "")} onClick={() => setTab("settings")}>
          營運設定
        </button>
        {isManager && (
          <button className={"sm-tab" + (tab === "staff" ? " on" : "")} onClick={() => setTab("staff")}>
            員工帳號
          </button>
        )}
      </div>
      {tab === "list" &&
        <ReservationList reservations={reservations} settings={settings} onUpdate={onUpdateRes} />}
      {tab === "settings" &&

}

/* ---------- 同步狀態列 ---------- */
function SyncBar({ sync, lastSync, onRefresh }) {
  const label = {
    idle: dataLayer.mode === "api" ? "已連線雲端,資料即時同步" : "本機預覽模式(資料僅存於此瀏覽器)",
    saving: "儲存中…",
    error: "上次同步失敗,請按重新整理",
    loading: "載入中…",
  }[sync];
  const dotClass = sync === "saving" ? "saving" : sync === "error" ? "error"
    : dataLayer.mode === "api" ? "idle" : "local";
  return (
    <div className="sm-syncbar">
      <span className={"sm-dot " + dotClass}></span>
      <span>{label}</span>
      {lastSync && sync === "idle" &&
        <span style={{ opacity: .7 }}>· 最後更新 {lastSync}</span>}
      {dataLayer.mode === "api" && (
        <button className="sm-sync-refresh" onClick={onRefresh} disabled={sync === "loading"}>
          ↻ 重新整理
        </button>
      )}
    </div>
  );
}

/* ============================================================
   App
   ============================================================ */
function App() {
  const [view, setView] = useState("front");
  const [reservations, setReservations] = useState([]);
  const [settings, setSettings] = useState(DEFAULT_SETTINGS);
  const [loading, setLoading] = useState(true);
  const [sync, setSync] = useState("loading");
  const [lastSync, setLastSync] = useState("");
  const [loadError, setLoadError] = useState("");

  // 登入狀態
  const [staff, setStaff] = useState(null);
  const [token, setToken] = useState("");
  const [showChangePw, setShowChangePw] = useState(false);

  const stamp = () => {
    const n = new Date();
    setLastSync(`${String(n.getHours()).padStart(2, "0")}:${String(n.getMinutes()).padStart(2, "0")}`);
  };

  // 公開載入(僅設定)
  const loadPublic = useCallback(async () => {
    try {
      const data = await dataLayer.loadPublic();
      setSettings(data.settings);
      setLoadError("");
      setSync("idle");
      stamp();
    } catch (e) {
      setLoadError(String(e.message || e));
      setSync("error");
    } finally {
      setLoading(false);
    }
  }, []);

  // 登入後載入(訂位 + 設定)
  const loadSecure = useCallback(async (tk, opts) => {
    opts = opts || {};
    try {
      const data = await dataLayer.loadSecure(tk);
      setReservations(data.reservations || []);
      setSettings(data.settings);
      if (data.staff) setStaff(data.staff);
      setLoadError("");
      setSync("idle");
      stamp();
      return true;
    } catch (e) {
      if (opts.silent) {
        setSync("error");
      } else {
        setLoadError(String(e.message || e));
        setSync("error");
      }
      return false;
    } finally {
      setLoading(false);
    }
  }, []);

  // 啟動:還原登入狀態
  useEffect(() => {
    const raw = sessionStore.get(K_SESSION);
    if (raw) {
      try {
        const sess = JSON.parse(raw);
        if (sess && sess.token && sess.staff) {
          setStaff(sess.staff);
          setToken(sess.token);
          loadSecure(sess.token).then((ok) => {
            if (!ok) {
              // 權杖失效 → 清除並改為公開模式
              sessionStore.del(K_SESSION);
              setStaff(null);
              setToken("");
              loadPublic();
            }
          });
          return;
        }
      } catch (e) {/* 略 */}
    }
    loadPublic();
  }, [loadPublic, loadSecure]);

  // 雲端模式:登入後每 30 秒自動同步
  useEffect(() => {
    if (!API_READY || !token) return;
    const t = setInterval(() => {
      loadSecure(token, { silent: true }).then((ok) => {
        if (!ok) {
          // 自動同步失敗(可能權杖失效)→ 登出
          sessionStore.del(K_SESSION);
          setStaff(null);
          setToken("");
        }
      });
    }, 30000);
    return () => clearInterval(t);
  }, [token, loadSecure]);

  // 登入
  const handleLogin = async (username, password) => {
    const { staff: s, token: tk } = await dataLayer.login(username, password);
    setStaff(s);
    setToken(tk);
    sessionStore.set(K_SESSION, JSON.stringify({ staff: s, token: tk }));
    setSync("loading");
    await loadSecure(tk);
  };

  // 登出
  const handleLogout = () => {
    sessionStore.del(K_SESSION);
    setStaff(null);
    setToken("");
    setReservations([]);
    loadPublic();
  };

  // 密碼變更後更新權杖
  const handlePwChanged = (newToken) => {
    setToken(newToken);
    sessionStore.set(K_SESSION, JSON.stringify({ staff, token: newToken }));
    setShowChangePw(false);
    alert("密碼已更新");
  };

  // 顧客線上訂位(無需登入)
  const addReservation = async (rec) => {
    const prev = reservations;
    const next = [...prev, rec];
    setReservations(next);
    setSync("saving");
    try {
      await dataLayer.addReservation(rec, "", next);
      setSync("idle");
      return true;
    } catch (e) {
      setReservations(prev);
      setSync("error");
      console.error(e);
      return false;
    }
  };

  // 後台:更新訂位 / 手動新增(isNew=true)
  const updateReservation = async (rec, isNew = false) => {
    const prev = reservations;
    const next = isNew ? [...prev, rec] : prev.map((r) => (r.id === rec.id ? rec : r));
    setReservations(next);
    setSync("saving");
    try {
      if (isNew) await dataLayer.addReservation(rec, token, next);
      else await dataLayer.updateReservation(rec, token, next);
      setSync("idle");
      return true;
    } catch (e) {
      setReservations(prev);
      setSync("error");
      alert("操作失敗:" + (e.message || e));
      return false;
    }
  };

  const updateSettings = async (s) => {
    const prev = settings;
    setSettings(s);
    setSync("saving");
    try {
      await dataLayer.saveSettings(s, token);
      setSync("idle");
      return true;
    } catch (e) {
      setSettings(prev);
      setSync("error");
      alert("營運設定儲存失敗:" + (e.message || e));
      return false;
    }
  };

  const loggedIn = !!staff;

  return (
    <div className="sm-app">
      <style>{CSS}</style>
      <div className="sm-wrap">
        <div className="sm-head">
          <div className="sm-logo"><img src={LOGO} alt="三毛咖啡 寵物咖啡" /></div>
          <span className="sm-sysname">訂位系統</span>
          <div className="sm-toggle">
            <button className={view === "front" ? "on" : ""} onClick={() => setView("front")}>
              前台訂位
            </button>
            <button className={view === "back" ? "on" : ""} onClick={() => setView("back")}>
              後台管理
            </button>
          </div>
        </div>

        <SyncBar sync={sync} lastSync={lastSync}
          onRefresh={() => (loggedIn ? loadSecure(token) : loadPublic())} />

        {/* 後台已登入:顯示員工資訊列 */}
        {view === "back" && loggedIn && (
          <div className="sm-staffbar">
            <span className="who">
              👤 {staff.displayName}
              <span className="role">{staff.role === "manager" ? "店長" : "一般員工"}</span>
            </span>
            <div className="acts">
              <button onClick={() => setShowChangePw(true)}>修改密碼</button>
              <button onClick={handleLogout}>登出</button>
            </div>
          </div>
        )}

        {loadError && (
          <div className="sm-banner-err">
            ⚠ 連線問題:{loadError}
            <br />請確認 API_URL 是否正確、Apps Script 是否已部署為「任何人」可存取。
          </div>
        )}

        {loading ? (
          <div className="sm-card"><div className="sm-empty"><div className="ic">⏳</div>載入中…</div></div>
        ) : view === "front" ? (
          <FrontDesk settings={settings} onSubmit={addReservation} />
        ) : !loggedIn ? (
          <LoginScreen onLogin={handleLogin} />
        ) : (
          <>
            {!API_READY && (
              <div className="sm-notice">
                💡 目前為本機預覽模式。將程式碼頂端的 <b>API_URL</b> 換成你的 Apps Script
                網址後,即切換為多人共用的雲端模式。
              </div>
            )}
            <BackOffice
              reservations={reservations} settings={settings}
              staff={staff} token={token}
              onUpdateRes={updateReservation} onUpdateSettings={updateSettings}
            />
          </>
        )}

        {showChangePw && (
          <ChangePasswordModal token={token}
            onClose={() => setShowChangePw(false)} onChanged={handlePwChanged} />
        )}

        <div className="sm-foot">三毛咖啡 包場請洽07-536-5630 高雄市苓雅區四維二路146號</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
